  #header h1 { font-size: 15px; font-weight: 600; color: #222; white-space: nowrap; }
  #search { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; outline: none; }
  #search:focus { border-color: #888; }
  #cat-filter { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #fff; outline: none; }
  #count { font-size: 12px; color: #888; white-space: nowrap; }
  #map { height: calc(100vh - 110px); }
  .legend { background: white; padding: 10px 14px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.15); line-height: 1.8; font-size: 13px; }
  .legend-title { font-weight: 600; margin-bottom: 4px; font-size: 13px; color: #333; }
  .legend-item { display: flex; align-items: center; gap: 7px; cursor: pointer; padding: 1px 0; }
  .legend-item:hover { opacity: 0.75; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-item.muted { opacity: 0.35; }
  .popup-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .popup-cat { font-size: 12px; color: #666; margin-bottom: 4px; }
  .popup-addr { font-size: 12px; color: #444; margin-bottom: 4px; }
  .popup-link a { font-size: 12px; color: #2563EB; text-decoration: none; }

const map = L.map('map').setView([37.94, -122.535], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

function makeIcon(color) {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="30" viewBox="0 0 22 30">'
    + '<path d="M11 0C4.925 0 0 4.925 0 11c0 8.25 11 19.8 11 19.8S22 19.25 22 11C22 4.925 17.075 0 11 0z"'
    + ' fill="' + color + '" stroke="white" stroke-width="1.5"/>'
    + '<circle cx="11" cy="11" r="4.5" fill="white" fill-opacity="0.85"/></svg>';
  return L.divIcon({ html: svg, className: '', iconSize: [22,30], iconAnchor: [11,30], popupAnchor: [0,-30] });
}

const markers = [];
const hiddenCats = new Set();

companies.forEach(c => {
  const color = catColors[c.category] || '#888888';
  const marker = L.marker([c.lat, c.lon], { icon: makeIcon(color) });
  const website = c.website ? `<div class="popup-link"><a href="${c.website}" target="_blank">${c.website.replace(/^https?:\/\//, '')}</a></div>` : '';
  marker.bindPopup(
    `<div class="popup-name">${c.name}</div>` +
    `<div class="popup-cat">${c.category}</div>` +
    (c.address ? `<div class="popup-addr">${c.address}</div>` : '') +
    website
  );
  marker._company = c;
  markers.push(marker);
  marker.addTo(map);
});

function filterMarkers() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  let visible = 0;
  markers.forEach(m => {
    const c = m._company;
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.address||'').toLowerCase().includes(q);
    const matchCat = !cat || c.category === cat;
    const matchLegend = !hiddenCats.has(c.category);
    if (matchQ && matchCat && matchLegend) {
      m.addTo(map);
      visible++;
    } else {
      map.removeLayer(m);
    }
  });
  document.getElementById('count').textContent = visible + ' of ' + companies.length + ' shown';
}

filterMarkers();

// Legend
const legendDiv = L.control({position: 'bottomright'});
legendDiv.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<div class="legend-title">Category</div>';
  Object.entries(catColors).forEach(([cat, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${cat}</span>`;
    item.addEventListener('click', () => {
      if (hiddenCats.has(cat)) hiddenCats.delete(cat);
      else hiddenCats.add(cat);
      item.classList.toggle('muted');
      filterMarkers();
    });
    div.appendChild(item);
  });
  return div;
};
legendDiv.addTo(map);
